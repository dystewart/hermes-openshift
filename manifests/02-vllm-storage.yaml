apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-storage
  namespace: hermes
  labels:
    app: hermes-agent
    component: vllm-storage
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  # Uncomment and adjust for your cluster's storage class:
  # storageClassName: ibmc-vpc-block-10iops-tier
