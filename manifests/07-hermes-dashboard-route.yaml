apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hermes-dashboard
  namespace: hermes
  labels:
    app: hermes-agent
    component: dashboard
spec:
  to:
    kind: Service
    name: hermes-agent
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None